version: '3.8'

# Use this file when connecting to AWS RDS (no local PostgreSQL container)
# Run with: docker-compose -f docker-compose.rds.yml up -d

services:
  web:
    build: .
    container_name: threat-toolkit
    ports:
      - '${PORT:-5000}:5000'
    environment:
      - SECRET_KEY=${SECRET_KEY:?SECRET_KEY must be set}
      - APP_ENV=${APP_ENV:-production}
      - ADMIN_EMAILS=${ADMIN_EMAILS:-}
      - FLASK_APP=wsgi:app
      - FLASK_DEBUG=false
      # Point to your AWS RDS instance
      - DATABASE_URL=${DATABASE_URL:?DATABASE_URL must be set for RDS}
      # Email Configuration
      - SMTP_SERVER=${SMTP_SERVER:-}
      - SMTP_PORT=${SMTP_PORT:-587}
      - SENDER_EMAIL=${SENDER_EMAIL:-}
      - SENDER_PASSWORD=${SENDER_PASSWORD:-}
    restart: unless-stopped
    networks:
      - threat-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/auth/login"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

networks:
  threat-network:
    driver: bridge
