version: '3.8'

services:
  web:
    build: .
    container_name: threat-toolkit
    ports:
      - '5000:5000'
    volumes:
      - ./app:/app/app
    environment:
      - SECRET_KEY=${SECRET_KEY:-dev-secret-key-change-in-prod}
      - APP_ENV=${APP_ENV:-development}
      - ADMIN_EMAILS=${ADMIN_EMAILS:-}
      - FLASK_APP=wsgi:app
      - FLASK_ENV=development
      - FLASK_DEBUG=true
    restart: unless-stopped
    networks:
      - threat-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/auth/login"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

networks:
  threat-network:
    driver: bridge